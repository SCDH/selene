name: Tests
on:
  push:
    paths-ignore:
      - 'README.md'
      - 'CONTRIBUTING.md'
    pull_request:
      branches:
        - main

jobs:
  test:
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v2
        with:
          java-version: '17'
          distribution: 'adopt'
          cache: maven

      - name: run maven
        run: ./mvnw --batch-mode --update-snapshots verify
